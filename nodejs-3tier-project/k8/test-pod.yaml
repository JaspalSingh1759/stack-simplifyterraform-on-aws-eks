apiVersion: v1
kind: Pod
metadata:
  name: test-secret
spec:
  serviceAccountName: nodejs-sa
  containers:
    - name: test
      image: busybox
      command: ["sleep", "3600"]
      volumeMounts:
        - name: secrets-store-inline
          mountPath: "/mnt/secrets"
          readOnly: true
  volumes:
    - name: secrets-store-inline
      csi:
        driver: secrets-store.csi.k8s.io
        readOnly: true
        volumeAttributes:
          secretProviderClass: "rds-secret"
  restartPolicy: Never
